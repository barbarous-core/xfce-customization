;=============================================================================
;
;   ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó
;   ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ  ‚ēö‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó
;   ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ
;   ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ    ‚ēö‚Ėą‚Ėą‚ēĒ‚ēĚ  ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó
;   ‚Ėą‚Ėą‚ēĎ     ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ
;   ‚ēö‚ēź‚ēĚ      ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēĚ   ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ
;
;   Config for: Mohamed's Fedora 43 / XFCE Desktop
;   Fonts:      JetBrains Mono ¬∑ Font Awesome 6 Free
;   Hardware:   Intel i7-8665U ¬∑ BAT0 ¬∑ intel_backlight
;   Network:    enp0s31f6 (eth) ¬∑ wlp0s20f3 (wifi)
;
;=============================================================================

; ---------------------------------------------------------------------------
; COLOR PALETTE  ‚ÄĒ Dark Slate / Indigo Accent Theme
; ---------------------------------------------------------------------------
[colors]
; Backgrounds
bg          = #CC0f1117
bg-alt      = #CC161b22
bg-highlight= #CC1e2430

; Foregrounds
fg          = #e2e8f0
fg-dim      = #8899aa
fg-muted    = #4a5568

; Accents
accent      = #7c6af7
accent-alt  = #a78bfa
green       = #56d364
yellow      = #e3b341
orange      = #f0883e
red         = #f85149
blue        = #58a6ff
cyan        = #39d353
pink        = #ec6cb9

; Separators
sep         = #2d3748
transparent = #00000000

; ---------------------------------------------------------------------------
; GLOBAL SETTINGS
; ---------------------------------------------------------------------------
[settings]
screenchange-reload = true
pseudo-transparency = true
compositing-background = over
compositing-foreground = over
compositing-border     = over

; ---------------------------------------------------------------------------
; BAR ‚ÄĒ TOP (Primary bar: workspaces + system info)
; ---------------------------------------------------------------------------
[bar/top]
monitor          = ${env:MONITOR:}
width            = 100%
height           = 34
offset-x         = 0
offset-y         = 0
radius           = 0

; Fonts
; font-N = <fontconfig pattern>;<vertical-offset>
font-0 = "JetBrains Mono:style=Medium:size=10;3"
font-1 = "JetBrains Mono:style=Bold:size=10;3"
font-2 = "Font Awesome 6 Free:style=Solid:size=11;3"
font-3 = "Font Awesome 6 Free:style=Regular:size=11;3"
font-4 = "Font Awesome 6 Brands:style=Regular:size=11;3"
font-5 = "JetBrains Mono:style=Medium:size=8;2"

; Colors
background       = ${colors.bg}
foreground       = ${colors.fg}

line-size        = 2
line-color       = ${colors.accent}

border-size      = 0
border-color     = ${colors.transparent}

padding-left     = 1
padding-right    = 1
module-margin    = 0

; Modules
modules-left     = launcher sep-dot xworkspaces sep-dot xwindow
modules-center   = date
modules-right    = playerctl sep-line cpu memory sep-line wlan eth sep-line backlight pulseaudio sep-line battery sep-dot powermenu

; Misc
cursor-click     = pointer
cursor-scroll    = ns-resize
enable-ipc       = true
wm-restack       = generic

; ---------------------------------------------------------------------------
; BAR ‚ÄĒ BOTTOM (Secondary bar: tray + quick stats)
; ---------------------------------------------------------------------------
[bar/bottom]
monitor          = ${env:MONITOR:}
width            = 100%
height           = 28
offset-x         = 0
offset-y         = 0
bottom           = true
radius           = 0

font-0 = "JetBrains Mono:style=Medium:size=9;2"
font-1 = "JetBrains Mono:style=Bold:size=9;2"
font-2 = "Font Awesome 6 Free:style=Solid:size=10;2"
font-3 = "Font Awesome 6 Free:style=Regular:size=10;2"
font-4 = "Font Awesome 6 Brands:style=Regular:size=10;2"
font-5 = "JetBrains Mono:style=Medium:size=7;1"

background       = ${colors.bg-alt}
foreground       = ${colors.fg-dim}

line-size        = 1
line-color       = ${colors.sep}

border-top-size  = 1
border-top-color = ${colors.sep}

padding-left     = 2
padding-right    = 2
module-margin    = 0

modules-left     = filesystem-root filesystem-home
modules-center   = mocp
modules-right    = temperature gpu-temp xkeyboard sep-dot systray

cursor-click     = pointer
cursor-scroll    = ns-resize
enable-ipc       = true

; ===========================================================================
;  MODULES
; ===========================================================================

; ---------------------------------------------------------------------------
; DECORATIVE ‚ÄĒ Separators
; ---------------------------------------------------------------------------
[module/sep-dot]
type = custom/text
format = " ¬∑ "
format-foreground = ${colors.fg-muted}

[module/sep-line]
type = custom/text
format = "  "
format-foreground = ${colors.sep}

; ---------------------------------------------------------------------------
; LAUNCHER ‚ÄĒ App menu button
; ---------------------------------------------------------------------------
[module/launcher]
type             = custom/text
format           = "  "
format-font      = 3
format-foreground = ${colors.accent}
format-padding   = 1

click-left       = xfce4-appfinder &
click-right      = xfce4-appfinder --collapsed &

; ---------------------------------------------------------------------------
; XWORKSPACES ‚ÄĒ XFCE virtual desktops
; ---------------------------------------------------------------------------
[module/xworkspaces]
type                        = internal/xworkspaces
pin-workspaces              = false
enable-click                = true
enable-scroll               = true
reverse-scroll              = false

icon-0                      = 1;
icon-1                      = 2;
icon-2                      = 3;
icon-3                      = 4;
icon-4                      = 5;
icon-default                = 

format          = <label-state>
format-padding  = 0

label-active            = %icon%  %name%
label-active-foreground = ${colors.accent}
label-active-background = ${colors.bg-highlight}
label-active-underline  = ${colors.accent}
label-active-padding    = 2

label-occupied            = %icon%
label-occupied-foreground = ${colors.fg-dim}
label-occupied-padding    = 2

label-urgent            = %icon%
label-urgent-foreground = ${colors.red}
label-urgent-background = ${colors.bg-highlight}
label-urgent-underline  = ${colors.red}
label-urgent-padding    = 2

label-empty             = %icon%
label-empty-foreground  = ${colors.fg-muted}
label-empty-padding     = 2

; ---------------------------------------------------------------------------
; XWINDOW ‚ÄĒ Active window title
; ---------------------------------------------------------------------------
[module/xwindow]
type            = internal/xwindow
label           = %title:0:60:‚Ä¶%
label-foreground = ${colors.fg-dim}
label-padding   = 1

; ---------------------------------------------------------------------------
; DATE & TIME
; ---------------------------------------------------------------------------
[module/date]
type            = internal/date
interval        = 5

date            = "%a %d %b"
time            = "%H:%M"
date-alt        = "%A %d %B %Y"
time-alt        = "%H:%M:%S"

label           = %{F#7c6af7}%{F-} %date%  %{F#7c6af7}%{F-} %time%
label-font      = 2
label-foreground = ${colors.fg}

click-left      = gsimplecal &

; ---------------------------------------------------------------------------
; CPU
; ---------------------------------------------------------------------------
[module/cpu]
type              = internal/cpu
interval          = 2
warn-percentage   = 85

format          = <label> <ramp-coreload>
format-prefix   = "%{F#7c6af7}%{F-} "
format-prefix-font = 3

label           = %percentage:3%%
label-warn      = %percentage:3%%
label-warn-foreground = ${colors.orange}

ramp-coreload-spacing = 1
ramp-coreload-0 = ‚ĖĀ
ramp-coreload-1 = ‚Ėā
ramp-coreload-2 = ‚ĖÉ
ramp-coreload-3 = ‚ĖĄ
ramp-coreload-4 = ‚ĖÖ
ramp-coreload-5 = ‚ĖÜ
ramp-coreload-6 = ‚Ėá
ramp-coreload-7 = ‚Ėą
ramp-coreload-0-foreground = ${colors.green}
ramp-coreload-1-foreground = ${colors.green}
ramp-coreload-2-foreground = ${colors.green}
ramp-coreload-3-foreground = ${colors.yellow}
ramp-coreload-4-foreground = ${colors.yellow}
ramp-coreload-5-foreground = ${colors.orange}
ramp-coreload-6-foreground = ${colors.red}
ramp-coreload-7-foreground = ${colors.red}

; ---------------------------------------------------------------------------
; MEMORY
; ---------------------------------------------------------------------------
[module/memory]
type            = internal/memory
interval        = 3
warn-percentage = 90

format          = <label>
format-prefix   = "%{F#7c6af7}%{F-} "
format-prefix-font = 3

label           = %percentage_used:3%%
label-warn      = %percentage_used:3%%
label-warn-foreground = ${colors.red}

; ---------------------------------------------------------------------------
; WIRELESS ‚ÄĒ wlp0s20f3
; ---------------------------------------------------------------------------
[module/wlan]
type            = internal/network
interface       = wlp0s20f3
interval        = 3
accumulate-stats = true

format-connected         = <label-connected>
format-connected-prefix  = "%{F#39d353}%{F-} "
format-connected-prefix-font = 3

label-connected          = %essid:0:12:‚Ä¶%  %{F#8899aa}%downspeed:7%%{F-}
label-connected-foreground = ${colors.fg}

format-disconnected         = <label-disconnected>
format-disconnected-prefix  = "%{F#4a5568}%{F-} "
format-disconnected-prefix-font = 3
label-disconnected          = offline
label-disconnected-foreground = ${colors.fg-muted}

; ---------------------------------------------------------------------------
; ETHERNET ‚ÄĒ enp0s31f6
; ---------------------------------------------------------------------------
[module/eth]
type            = internal/network
interface       = enp0s31f6
interval        = 3
accumulate-stats = true

format-connected         = <label-connected>
format-connected-prefix  = "%{F#58a6ff}%{F-} "
format-connected-prefix-font = 3

label-connected          = %local_ip%  %{F#8899aa}%downspeed:7%%{F-}
label-connected-foreground = ${colors.fg}

format-disconnected         = <label-disconnected>
format-disconnected-prefix  = "%{F#4a5568}%{F-} "
format-disconnected-prefix-font = 3
label-disconnected          = no eth
label-disconnected-foreground = ${colors.fg-muted}

; ---------------------------------------------------------------------------
; BATTERY ‚ÄĒ BAT0
; ---------------------------------------------------------------------------
[module/battery]
type            = internal/battery
battery         = BAT0
adapter         = AC
full-at         = 99
low-at          = 20
poll-interval   = 10

format-charging         = <label-charging>
format-charging-prefix  = "%{F#e3b341}%{F-} "
format-charging-prefix-font = 3

format-discharging      = <ramp-capacity> <label-discharging>

format-full             = <label-full>
format-full-prefix      = "%{F#56d364}%{F-} "
format-full-prefix-font = 3

format-low              = <animation-low> <label-low>

label-charging          = %percentage%%  %time%
label-charging-foreground = ${colors.yellow}

label-discharging       = %percentage%%  %time%
label-discharging-foreground = ${colors.fg}

label-full              = Full
label-full-foreground   = ${colors.green}

label-low               = %percentage%%
label-low-foreground    = ${colors.red}

ramp-capacity-0         = 
ramp-capacity-1         = 
ramp-capacity-2         = 
ramp-capacity-3         = 
ramp-capacity-4         = 
ramp-capacity-0-foreground = ${colors.red}
ramp-capacity-1-foreground = ${colors.orange}
ramp-capacity-2-foreground = ${colors.yellow}
ramp-capacity-3-foreground = ${colors.green}
ramp-capacity-4-foreground = ${colors.green}
ramp-capacity-font      = 3

animation-low-0         = 
animation-low-1         = 
animation-low-framerate = 500
animation-low-font      = 3
animation-low-foreground = ${colors.red}

; ---------------------------------------------------------------------------
; BACKLIGHT ‚ÄĒ intel_backlight
; ---------------------------------------------------------------------------
[module/backlight]
type             = internal/backlight
card             = intel_backlight
use-actual-brightness = true
enable-scroll    = true
scroll-interval  = 5

format          = <ramp> <label>
label           = %percentage%%
label-foreground = ${colors.fg-dim}

ramp-0          = 
ramp-1          = 
ramp-2          = 
ramp-3          = 
ramp-4          = 
ramp-font       = 3
ramp-0-foreground = ${colors.fg-muted}
ramp-1-foreground = ${colors.fg-dim}
ramp-2-foreground = ${colors.yellow}
ramp-3-foreground = ${colors.yellow}
ramp-4-foreground = ${colors.fg}

; ---------------------------------------------------------------------------
; PULSEAUDIO
; ---------------------------------------------------------------------------
[module/pulseaudio]
type             = internal/pulseaudio
use-ui-max       = true
interval         = 5

format-volume         = <ramp-volume> <label-volume>
label-volume          = %percentage%%
label-volume-foreground = ${colors.fg}

label-muted           = 
label-muted-font      = 3
label-muted-foreground = ${colors.fg-muted}

ramp-volume-0         = 
ramp-volume-1         = 
ramp-volume-2         = 
ramp-volume-font      = 3
ramp-volume-0-foreground = ${colors.fg-dim}
ramp-volume-1-foreground = ${colors.fg-dim}
ramp-volume-2-foreground = ${colors.cyan}

click-right           = pavucontrol &

; ---------------------------------------------------------------------------
; TEMPERATURE ‚ÄĒ CPU (Intel)
; ---------------------------------------------------------------------------
[module/temperature]
type            = internal/temperature
interval        = 5
thermal-zone    = 0
warn-temperature = 75
; hwmon-path auto-detected via thermal-zone (number changes per boot)
; To pin manually: find /sys/devices/platform/coretemp.0 -name temp1_input
hwmon-path      = /sys/devices/platform/coretemp.0/hwmon/hwmon9/temp1_input

format          = <ramp> <label>
format-warn     = <ramp> <label-warn>

label           = %temperature-c%
label-foreground = ${colors.fg-dim}

label-warn      = %temperature-c%
label-warn-foreground = ${colors.orange}

ramp-0          = 
ramp-1          = 
ramp-2          = 
ramp-font       = 3
ramp-0-foreground = ${colors.green}
ramp-1-foreground = ${colors.yellow}
ramp-2-foreground = ${colors.red}

; ---------------------------------------------------------------------------
; GPU TEMP ‚ÄĒ Script-based (for Intel integrated / no dedicated GPU)
; ---------------------------------------------------------------------------
[module/gpu-temp]
type            = custom/script
exec            = cat /sys/class/drm/card0/device/hwmon/hwmon*/temp1_input 2>/dev/null | awk '{printf "%.0f¬įC", $1/1000}' || echo "N/A"
interval        = 5
format-prefix   = " "
format-prefix-font = 3
format-prefix-foreground = ${colors.blue}
label           = %output%
label-foreground = ${colors.fg-dim}

; ---------------------------------------------------------------------------
; PLAYERCTL ‚ÄĒ Media player (MOC / any MPRIS player)
; ---------------------------------------------------------------------------
[module/playerctl]
type            = custom/script
exec            = playerctl metadata --format '{{emoji(status)}} {{artist:0:15}} ‚Äď {{title:0:20}}' 2>/dev/null || echo ""
exec-if         = playerctl status 2>/dev/null
interval        = 3

format          = <label>
format-prefix   = " "
format-prefix-font = 3
format-prefix-foreground = ${colors.pink}
label           = %output:0:45:‚Ä¶%
label-foreground = ${colors.fg-dim}

click-left      = playerctl play-pause &
click-right     = playerctl next &
scroll-up       = playerctl next &
scroll-down     = playerctl previous &

; ---------------------------------------------------------------------------
; MOCP ‚ÄĒ Music On Console (direct fallback)
; ---------------------------------------------------------------------------
[module/mocp]
type            = custom/script
exec            = mocp -Q "%artist - %title" 2>/dev/null | head -1 | cut -c1-40 || echo "No music"
exec-if         = mocp -i 2>/dev/null | grep -q "State: PLAY"
interval        = 3

format          = <label>
format-prefix   = " "
format-prefix-font = 3
format-prefix-foreground = ${colors.pink}
label           = %output%
label-foreground = ${colors.fg-dim}

click-left      = mocp --toggle-pause &
click-right     = mocp --next &
scroll-up       = mocp --next &
scroll-down     = mocp --previous &

; ---------------------------------------------------------------------------
; FILESYSTEM
; ---------------------------------------------------------------------------
[module/filesystem-root]
type            = internal/fs
mount-0         = /
interval        = 30
fixed-values    = false

format-mounted         = <label-mounted>
format-mounted-prefix  = " "
format-mounted-prefix-font = 3
format-mounted-prefix-foreground = ${colors.accent}

label-mounted   = /  %free%
label-mounted-foreground = ${colors.fg-dim}

label-warn      = /  %free%
label-warn-foreground = ${colors.red}
warn-percentage = 90

[module/filesystem-home]
type            = internal/fs
mount-0         = /home
interval        = 30
fixed-values    = false

format-mounted         = <label-mounted>
format-mounted-prefix  = " "
format-mounted-prefix-font = 3
format-mounted-prefix-foreground = ${colors.accent}

label-mounted   = ~  %free%
label-mounted-foreground = ${colors.fg-dim}

label-warn      = ~  %free%
label-warn-foreground = ${colors.red}
warn-percentage = 90

; ---------------------------------------------------------------------------
; KEYBOARD LAYOUT
; ---------------------------------------------------------------------------
[module/xkeyboard]
type            = internal/xkeyboard
blacklist-0     = num lock
blacklist-1     = scroll lock

format-prefix   = " "
format-prefix-font = 3
format-prefix-foreground = ${colors.accent-alt}

label-layout    = %layout%
label-layout-foreground = ${colors.fg-dim}

label-indicator-padding = 2
label-indicator-background = ${colors.bg-highlight}
label-indicator-foreground = ${colors.yellow}

; ---------------------------------------------------------------------------
; SYSTRAY
; ---------------------------------------------------------------------------
[module/systray]
type = internal/tray
tray-spacing = 4px
tray-background = ${colors.bg-alt}
tray-padding = 2px

; ---------------------------------------------------------------------------
; POWERMENU ‚ÄĒ Custom script
; ---------------------------------------------------------------------------
[module/powermenu]
type            = custom/menu

expand-right    = false
format-spacing  = 1

label-open      = 
label-open-font = 3
label-open-foreground = ${colors.red}
label-close     = 
label-close-font = 3
label-close-foreground = ${colors.fg-muted}
label-separator = |
label-separator-foreground = ${colors.sep}

; Main menu
menu-0-0        = Suspend
menu-0-0-foreground = ${colors.yellow}
menu-0-0-exec   = systemctl suspend

menu-0-1        = Reboot
menu-0-1-foreground = ${colors.orange}
menu-0-1-exec   = systemctl reboot

menu-0-2        = Shutdown
menu-0-2-foreground = ${colors.red}
menu-0-2-exec   = systemctl poweroff

menu-0-3        = Logout
menu-0-3-foreground = ${colors.fg-dim}
menu-0-3-exec   = xfce4-session-logout

; vim: ft=dosini
