[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/main]
width = 100%
height = 32
radius = 16

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 0


module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = monospace;2
font-1 = JetBrainsMono Nerd Font Mono:size=24;3
font-2 = JetBrainsMono Nerd Font Mono:size=14;4
font-3 = JetBrainsMono Nerd Font Mono:size=24;4

modules-left = jgmenu xworkspaces add-workspace scroll-window
modules-center = date
modules-right = filesystem temperature xkeyboard xbacklight pulseaudio battery powermenu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/jgmenu]
type = custom/text
; Use an icon or text for the button
format = " %{T3}ÔĆč%{T-} "
format-foreground = #61afef
; The command to pop up the menu
click-left = jgmenu_run


[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = custom/script
exec = /home/mohamed/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/workspaces.sh
interval = 1
tail = false


[module/add-workspace]
type = custom/script
exec = /home/mohamed/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/plus_button.sh
interval = 1
click-left = bash /home/mohamed/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/add_workspace.sh

[module/scroll-window]
type = custom/script
exec = /home/mohamed/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/scroll_window.sh
tail = true
label-foreground = ${colors.disabled}
click-left = bash /home/mohamed/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/window_list.sh

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}


[module/pulseaudio]
type = internal/pulseaudio

format-volume = %{F#F0C674}%{T4}<ramp-volume>%{T-}%{F-} <label-volume>
label-volume = %percentage%%

label-muted = %{T4}ÓĽ®%{T-} muted
label-muted-foreground = ${colors.alert}

ramp-volume-0 = ÔÄß
ramp-volume-1 = ÔÄ®

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = ""

[module/wlan]
inherit = network-base
interface-type = wireless
format-connected = <ramp-signal> <label-connected>
label-connected = ‚Üď %downspeed%  ‚ÜĎ %upspeed%

ramp-signal-0 = %{F#A54242}%{T3}ůį§Į%{T-}%{F-}
ramp-signal-1 = %{F#F0C674}%{T3}ůį§ü%{T-}%{F-}
ramp-signal-2 = %{F#F0C674}%{T3}ůį§Ę%{T-}%{F-}
ramp-signal-3 = %{F#F0C674}%{T3}ůį§•%{T-}%{F-}
ramp-signal-4 = %{F#F0C674}%{T3}ůį§®%{T-}%{F-}

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%{T3}ůįąÄ%{T-}%{F-}  ‚Üď %downspeed%  ‚ÜĎ %upspeed%

[module/date]
type = internal/date
interval = 1

#date = %H:%M
date = %Y-%m-%d %H:%M:%S

label = %{A1:orage -t:}%date%%{A}
label-foreground = ${colors.primary}
[module/battery]
type = custom/script
exec = python3 /home/mohamed/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/battery_custom.py
tail = true
format = %{A1:/home/mohamed/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/yad_power.sh:}<label>%{A}
label = %output%

[module/powermenu]
type = custom/text
format = " %{T3}ÔÄĎ%{T-} "
format-foreground = ${colors.alert}
click-left = xfce4-session-logout

[settings]
screenchange-reload = true
pseudo-transparency = false

; vim:ft=dosini
[module/temperature]
type = internal/temperature

; Seconds to sleep between updates
; Default: 1
interval = 0.5

; Thermal zone to use
; To list all the zone types, run 
; $ for i in /sys/class/thermal/thermal_zone*; do echo "$i: $(<$i/type)"; done
; Default: 0
thermal-zone = 0

; Select thermal zone by name
; The name has to match the contents of /sys/class/thermal/thermal_zone*/type
; for the desired thermal zone.
; New in version 3.7.0
; Default: ""
zone-type = x86_pkg_temp

; Full path of temperature sysfs path
; Use `sensors` to find preferred temperature source, then run
; $ for i in /sys/class/hwmon/hwmon*/temp*_input; do echo "$(<$(dirname $i)/name): $(cat ${i%_*}_label 2>/dev/null || echo $(basename ${i%_*})) $(readlink -f $i)"; done
; to find path to desired file
; Default reverts to thermal zone setting
hwmon-path = /sys/devices/platform/coretemp.0/hwmon/hwmon2/temp1_input

; Base temperature for where to start the ramp (in degrees celsius)
; Default: 0
base-temperature = 20

; Threshold temperature to display warning label (in degrees celsius)
; Default: 80
warn-temperature = 60


[module/xbacklight]
type = internal/xbacklight

; XRandR output to get get values from
; Default: the monitor defined for the running bar
;output = HDMI-1

; Create scroll handlers used to set the backlight value
; Default: true
enable-scroll = false