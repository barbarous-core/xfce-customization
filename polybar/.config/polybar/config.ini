include-file = ./colors.ini

[bar/main]
monitor = ${env:MONITOR:}
bottom = ${env:POLYBAR_BOTTOM:false}
width = 100%
height = 32
radius = 12

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 0


module-margin = 0

separator = 
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font:style=Regular:size=10;3
font-1 = JetBrainsMono Nerd Font Mono:size=24;3
font-2 = JetBrainsMono Nerd Font Mono:size=14;4
font-3 = JetBrainsMono Nerd Font Mono:size=18;4
font-4 = JetBrainsMono Nerd Font:style=Bold:size=10;3
font-5 = JetBrainsMono Nerd Font:size=14;3

modules-left = ${env:POLYBAR_LEFT:jgmenu themes sep xworkspaces sep add-workspace sep scroll-window sep}
modules-center = ${env:POLYBAR_CENTER:date}
modules-right = ${env:POLYBAR_RIGHT:sep sys-switch sep xkeyboard sep media sep battery sep connection sep powermenu}

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/jgmenu]
type = custom/text
; Use an icon or text for the button
format = "%{T4}ÔĆč%{T-}"
format-padding = 1
format-margin = 1
format-foreground = #F0C674
; The command to pop up the menu
click-left = bash ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/jgmenu_anchored.sh


[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = custom/script
exec = ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/workspaces.sh
interval = 1
tail = false


[module/add-workspace]
type = custom/script
exec = ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/plus_button.sh
interval = 1
click-left = bash ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/add_workspace.sh

[module/scroll-window]
type = custom/script
exec = ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/scroll_window.sh
tail = true
label-foreground = ${colors.primary}
label-min-width = 500
label-alignment = left
click-left = bash ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/window_list.sh

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F${colors.primary}}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}


[module/media]
type = custom/script
exec = ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/media_status.sh
tail = true
click-right = pavucontrol
click-middle = ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/toggle_module.sh media
scroll-up = pactl set-sink-volume @DEFAULT_SINK@ +5%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -5%
label-padding = 1


[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = 

layout-icon-default = 
layout-icon-0 = us;US
layout-icon-1 = fr;FR
layout-icon-2 = ar;AR

label-layout = %{A3:bash ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/open_kb_settings.sh:}%{T1}%icon%%{T-}%{A}
label-layout-padding = 1
label-layout-foreground = ${colors.primary}

label-indicator-on-numlock = " N "
label-indicator-on-numlock-foreground = ${colors.background}
label-indicator-on-numlock-background = ${colors.primary}
label-indicator-on-numlock-padding = 0

label-indicator-on-capslock = " C "
label-indicator-on-capslock-foreground = ${colors.background}
label-indicator-on-capslock-background = ${colors.alert}
label-indicator-on-capslock-padding = 0

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "%{T4}Ôíľ%{T-} "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = ""

[module/connection]
type = custom/script
exec = ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/connection_status.sh
tail = true
click-middle = ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/toggle_module.sh connection
label-padding = 1


[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%{T4}ůįąÄ%{T-}%{F-}  ‚Üď %downspeed%  ‚ÜĎ %upspeed%

[module/date]
type = internal/date
interval = 1

#date = %H:%M
date = %Y-%m-%d %H:%M:%S

label = %{A1:orage -t:}%date%%{A}
label-foreground = ${colors.primary}
label-padding = 1
[module/battery]
type = custom/script
exec = python3 ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/battery_custom.py
tail = true
format = %{A1:~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/yad_power.sh:}<label>%{A}
label = %output%
[module/themes]
type = custom/script
exec = ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/theme_status.sh
tail = true
click-left = ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/theme_selector.sh
click-middle = ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/toggle_module.sh themes
label-padding = 1

[module/powermenu]
type = custom/text
format = " %{T4}ÔÄĎ%{T-} "
format-foreground = ${colors.alert}
click-left = xfce4-session-logout

[settings]
screenchange-reload = true
pseudo-transparency = false

; vim:ft=dosini
[module/sep]
type = custom/text
format = " | "
format-foreground = ${colors.disabled}

[module/space]
type = custom/text
format = " "

[module/sys-switch]
type = custom/script
exec = ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/system_switcher.sh
tail = true
click-middle = ~/Linux_Data/Git_Projects/xfce-customization/polybar/.config/polybar/scripts/toggle_module.sh system
label-min-width = 120
label-alignment = center

[module/temperature]
type = internal/temperature

; Seconds to sleep between updates
; Default: 1
interval = 0.5

; Thermal zone to use
; To list all the zone types, run 
; $ for i in /sys/class/thermal/thermal_zone*; do echo "$i: $(<$i/type)"; done
; Default: 0
thermal-zone = 0

; Select thermal zone by name
; The name has to match the contents of /sys/class/thermal/thermal_zone*/type
; for the desired thermal zone.
; New in version 3.7.0
; Default: ""
zone-type = x86_pkg_temp

; Full path of temperature sysfs path
; Use `sensors` to find preferred temperature source, then run
; $ for i in /sys/class/hwmon/hwmon*/temp*_input; do echo "$(<$(dirname $i)/name): $(cat ${i%_*}_label 2>/dev/null || echo $(basename ${i%_*})) $(readlink -f $i)"; done
; to find path to desired file
; Default reverts to thermal zone setting
hwmon-path = /sys/devices/platform/coretemp.0/hwmon/hwmon2/temp1_input

; Base temperature for where to start the ramp (in degrees celsius)
; Default: 0
base-temperature = 20

; Threshold temperature to display warning label (in degrees celsius)
; Default: 80
warn-temperature = 60


[module/xbacklight]
type = internal/xbacklight

; XRandR output to get get values from
; Default: the monitor defined for the running bar
;output = HDMI-1

; Create scroll handlers used to set the backlight value
; Default: true
enable-scroll = false