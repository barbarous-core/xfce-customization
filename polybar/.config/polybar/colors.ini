#!/usr/bin/env bash
# =============================================================================
#  colors.ini — Shared color palette (included by config.ini via include-file)
#
#  Source this file in config.ini with:
#    include-file = ~/.config/polybar/colors.ini
# =============================================================================

[colors]
; ── Backgrounds ──────────────────────────────────────────────────────────────
bg              = #CC0f1117
bg-alt          = #CC161b22
bg-highlight    = #CC1e2430

; ── Foregrounds ──────────────────────────────────────────────────────────────
fg              = #e2e8f0
fg-dim          = #8899aa
fg-muted        = #4a5568

; ── Accents ──────────────────────────────────────────────────────────────────
accent          = #7c6af7
accent-alt      = #a78bfa
green           = #56d364
yellow          = #e3b341
orange          = #f0883e
red             = #f85149
blue            = #58a6ff
cyan            = #39d353
pink            = #ec6cb9

; ── UI ───────────────────────────────────────────────────────────────────────
sep             = #2d3748
transparent     = #00000000
